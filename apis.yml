name: Capterra
description: >-
  Capterra is a Gartner Digital Markets property and one of the
  largest software review and comparison marketplaces, helping
  business buyers discover, research, and select software across
  hundreds of categories through verified user reviews, feature
  comparisons, and pricing information. For participating software
  vendors, Capterra and its sister sites GetApp and Software Advice
  offer a pay-per-click lead-generation program, and the Capterra
  Click Report API allows vendors to programmatically retrieve
  historical click performance data.
