apis:
  - aid: capterra:click-report-api
    name: Capterra Click Report API
    tags:
      - Advertising
      - B2B
      - PPC
      - Software Reviews
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://www.capterra.com
    humanURL: https://www.capterra.com/vp/login
    properties:
      - url: https://www.capterra.com/vp/login
        type: Documentation
    description: >-
      The Capterra Click Report API allows software vendors to programmatically retrieve
      historical click data from their Capterra pay-per-click (PPC) advertising campaigns.
      Vendors can access click metrics across different software categories, countries,
      and distribution channels. The API uses API key authentication obtained through
      Capterra account managers and returns data across all Gartner Digital Markets
      accounts mapped to the vendor, covering Capterra, GetApp, and Software Advice.
